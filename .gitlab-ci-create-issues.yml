# Job para crear issues automáticamente desde reportes de seguridad

create_security_issues:
  stage: .post
  image: alpine:latest
  before_script:
    - apk add --no-cache curl jq bash
  script:
    - |
      echo "Buscando vulnerabilidades en pipeline ${CI_PIPELINE_ID}..."
      
      JOBS=$(curl -s --header "PRIVATE-TOKEN: $CI_PERSONAL_TOKEN" \
        "https://scovil.labtau.com/api/v4/projects/${CI_PROJECT_ID}/pipelines/${CI_PIPELINE_ID}/jobs" | \
        jq -r '.[] | select(.name | contains("sast") or contains("secret") or contains("dependency")) | select(.status == "success") | "\(.id) \(.name)"')
      
      if [ -z "$JOBS" ]; then
        echo "No hay jobs de seguridad exitosos"
        exit 0
      fi
      
      mkdir -p /tmp/reports && cd /tmp/reports
      
      echo "$JOBS" | while read -r JOB_ID JOB_NAME; do
        echo "Procesando job: $JOB_NAME (ID: $JOB_ID)"
        
        LABEL="security"
        case "$JOB_NAME" in
          *sast*) LABEL="security,sast" ;;
          *secret*) LABEL="security,secret-detection" ;;
          *dependency*) LABEL="security,dependency-scanning" ;;
        esac
        
        curl -s --header "PRIVATE-TOKEN: $CI_PERSONAL_TOKEN" \
          "https://scovil.labtau.com/api/v4/projects/${CI_PROJECT_ID}/jobs/${JOB_ID}/artifacts" \
          -o "${JOB_ID}.zip"
        
        if [ -f "${JOB_ID}.zip" ]; then
          unzip -q -o "${JOB_ID}.zip" 2>/dev/null || true
          
          REPORT=$(find . -name "gl-*-report.json" -type f | head -1)
          
          if [ -n "$REPORT" ] && [ -f "$REPORT" ]; then
            echo "Analizando reporte: $REPORT"
            
            jq -r '.vulnerabilities[]? | select(.severity == "High" or .severity == "Critical") | @json' "$REPORT" 2>/dev/null | while IFS= read -r vuln; do
              TITLE=$(echo "$vuln" | jq -r '.name // "Vulnerabilidad"')
              SEVERITY=$(echo "$vuln" | jq -r '.severity')
              DESC=$(echo "$vuln" | jq -r '.description // "Sin descripción"' | head -c 300)
              LOC=$(echo "$vuln" | jq -r '.location.file // "N/A"')
              LINE=$(echo "$vuln" | jq -r '.location.start_line // ""')
              
              [ -n "$LINE" ] && LOC="${LOC}:${LINE}"
              
              BODY="## Vulnerabilidad: ${TITLE}

**Severidad:** ${SEVERITY}  
**Archivo:** \`${LOC}\`  
**Pipeline:** [#${CI_PIPELINE_ID}](https://scovil.labtau.com/${CI_PROJECT_PATH}/-/pipelines/${CI_PIPELINE_ID})

### Descripción
${DESC}

---
*Generado automáticamente desde pipeline de seguridad*"
              
              # Crear issue usando API de GitLab
              RESPONSE=$(curl -s --request POST \
                --header "PRIVATE-TOKEN: $CI_PERSONAL_TOKEN" \
                --header "Content-Type: application/json" \
                --data "{\"title\":\"[${SEVERITY}] ${TITLE}\",\"description\":$(echo "$BODY" | jq -Rs .),\"labels\":\"${LABEL}\"}" \
                "https://scovil.labtau.com/api/v4/projects/${CI_PROJECT_ID}/issues")
              
              ISSUE_ID=$(echo "$RESPONSE" | jq -r '.iid // empty')
              if [ -n "$ISSUE_ID" ]; then
                echo "✓ Issue #${ISSUE_ID} creado: ${TITLE}"
              fi
            done
          fi
          
          rm -f "${JOB_ID}.zip" gl-*-report.json
        fi
      done
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop"'
      when: on_success
    - when: never
  allow_failure: true

# Pipeline para gitlab.com: Security + Build + Push Registry
stages:
  - security
  - build
  - report

# Security scanning (Ultimate features)
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml
  - template: Code-Quality.gitlab-ci.yml

# Build Docker image
build_image:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Building Docker image..."
    - docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
    - echo "Pushing to gitlab.com registry..."
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
    - echo "Image available at $IMAGE_TAG"
  only:
    - master
    - main

# Container scanning de la imagen construida
container_scanning:
  stage: security
  variables:
    CS_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  dependencies:
    - build_image
  only:
    - master
    - main

# Sincronizar resultados a scovil
sync_to_scovil:
  stage: report
  image: alpine:latest
  before_script:
    - apk add --no-cache curl jq bash
  script:
    - |
      echo "=== Sincronizando a scovil.labtau.com ==="
      
      # 1. Issues de seguridad
      for REPORT in gl-sast-report.json gl-dependency-scanning-report.json gl-secret-detection-report.json gl-container-scanning-report.json; do
        if [ -f "$REPORT" ]; then
          echo "Procesando $REPORT..."
          jq -r '.vulnerabilities[]? | select(.severity == "High" or .severity == "Critical") | @json' "$REPORT" | while read -r vuln; do
            TITLE=$(echo "$vuln" | jq -r '.name')
            SEVERITY=$(echo "$vuln" | jq -r '.severity')
            
            curl -s --request POST \
              --header "PRIVATE-TOKEN: $SCOVIL_TOKEN" \
              "https://scovil.labtau.com/api/v4/projects/$SCOVIL_PROJECT_ID/issues" \
              --data "title=[$SEVERITY] $TITLE" \
              --data "description=**Source:** gitlab.com pipeline $CI_PIPELINE_ID\n**Image:** $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" \
              --data "labels=security,from-gitlab-cloud" > /dev/null
          done
        fi
      done
      
      # 2. Code Quality issues
      if [ -f "gl-code-quality-report.json" ]; then
        echo "Procesando code quality..."
        jq -r '.[] | select(.severity == "major" or .severity == "critical") | @json' "gl-code-quality-report.json" | head -5 | while read -r issue; do
          DESC=$(echo "$issue" | jq -r '.description')
          
          curl -s --request POST \
            --header "PRIVATE-TOKEN: $SCOVIL_TOKEN" \
            "https://scovil.labtau.com/api/v4/projects/$SCOVIL_PROJECT_ID/issues" \
            --data "title=[Code Quality] $DESC" \
            --data "description=From gitlab.com pipeline $CI_PIPELINE_ID" \
            --data "labels=code-quality,from-gitlab-cloud" > /dev/null
        done
      fi
      
      # 3. Notificar imagen disponible
      curl -s --request POST \
        --header "PRIVATE-TOKEN: $SCOVIL_TOKEN" \
        "https://scovil.labtau.com/api/v4/projects/$SCOVIL_PROJECT_ID/notes" \
        --data "body=✅ Nueva imagen disponible:\n\`$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA\`\n\nPull desde gscovil:\n\`\`\`bash\ndocker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA\n\`\`\`" > /dev/null
      
      echo "✓ Sincronización completada"
  only:
    - master
    - main
  allow_failure: true
